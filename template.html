<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>aaah.run</title>
    <link rel="stylesheet" href="/css/serenity.css" kind="text/css">
    <link rel="stylesheet" href="/css/aaron.css" kind="text/css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.2/dist/katex.min.css" integrity="sha384-bYdxxUwYipFNohQlHt0bjN/LCpueqWz13HufFEV1SUatKs1cm4L6fFgCi1jT643X" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.2/dist/katex.min.js" integrity="sha384-Qsn9KnoKISj6dI8g7p1HBlNpVx0I8p1SvlwOldgi3IorMle61nQy4zEahWYtljaz" crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.2/dist/contrib/auto-render.min.js" integrity="sha384-+VBxd3r6XgURycqtZ117nYw44OOcIax56Z4dCRWbxyPt0Koah1uHoK0o4+/RRE05" crossorigin="anonymous"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function() {
        renderMathInElement(document.body, {
          delimiters: [
            {left: "$$", right: "$$", display: true},
            {left: "$", right: "$", display: false}
          ]
        });
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script>
      mermaid.initialize({
        startOnLoad: true,
        theme: "base",
        themeCSS: "overflow: visible;",
        fontFamily: "inherit",
      });
      document.addEventListener("DOMContentLoaded", function() {
        for (elem of document.getElementsByClassName("language-mermaid")) {
          elem.classList.add("mermaid");
        }
      });
    </script>
  </head>
  <body>
    <div id="content">
      <h3>
        {{ .Env.BREADCRUMB }}
      </h3>
      <h1>{{ .Env.TITLE }}</h1>
      <div class="byline">
        <p>{{ .Env.DATE }}</p>
      </div>
{{ .Env.BODY }}
    </div>
    <div class="footer">
      <hr>
      Made with
      <a href="https://hale.su/serenity.html">serenity.css</a>.
    </div>
  </body>
</html>
