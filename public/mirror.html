<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width" />
  <title>Face Symmetry Overlay</title>
  <style>
    body { background: #111; display: flex; flex-direction: column; align-items: center; color: #eee; font-family: sans-serif; padding: 0; }
    canvas { background: #222; }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline
    style="width:1px;height:1px;position:absolute;top:0;left:0;z-index:-1;"></video>
  <canvas id="canvas" width="640" height="480"></canvas>
  <div id="msg"></div>
  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const msg = document.getElementById('msg');
    let w = canvas.width, h = canvas.height;

    // Request camera
    navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
      video.srcObject = stream;
      video.onloadedmetadata = () => {
        // Set canvas to video size if different
        w = video.videoWidth;
        h = video.videoHeight;
        canvas.width = w;
        canvas.height = h;
        draw();
      };
    }).catch(e => {
      msg.textContent = 'Could not access camera: ' + e;
    });

    function draw() {
      ctx.clearRect(0, 0, w, h);

      // Draw normal video
      ctx.globalAlpha = 1.0;
      ctx.drawImage(video, 0, 0, w, h);

      // Draw flipped video overlay
      ctx.save();
      ctx.translate(w, 0);
      ctx.scale(-1, 1);
      ctx.globalAlpha = 0.5;
      ctx.drawImage(video, 0, 0, w, h);
      ctx.restore();

      ctx.globalAlpha = 1.0;

      requestAnimationFrame(draw);
    }
  </script>
</body>
</html>
