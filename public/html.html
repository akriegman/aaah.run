<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>HTML Playground</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      background: black;
      color: white;
      border-radius: 0;
      font-family: monospace;
    }
    body {
      min-height: 100svh;
      display: flex;
      justify-content: center;
    }
    .page {
      max-width: 45em;
      width: 100%;
      display: flex;
      flex-direction: column;
    }
    .top-row {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      justify-content: space-between;
      outline: 1px solid white;
    }
    #title {
      font-size: 1.5rem;
            padding-left: 0.8rem;
    }
    textarea {
      width: 100%;
      height: 40vh;
      font-family: monospace;
      font-size: 14px;
      resize: none;
      outline: 1px solid white;
      border: none;
      padding: 0.3em;
    }
    iframe {
      flex: 1;
      width: 100%;
      border: 1px solid white;
      background: white;
      min-height: 30vh;
    }
    button {
      padding: 0.8rem 0.8rem;
      cursor: pointer;
      margin-left: auto;
      outline: 1px solid white;
      border: none;
    }
    #share-status {
      font-size: 0.85rem;
      color: #ccc;
      margin-left: auto;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="top-row">
      <span id="title">HTML Playground</span>
      <div>
      <span id="share-status"></span>
      <button id="share-btn">Share</button>
      </div>
    </div>

    <textarea id="editor" placeholder="Type HTML here..."></textarea>

    <iframe id="preview"></iframe>
  </div>

  <script>
    const textarea = document.getElementById('editor');
    const iframe = document.getElementById('preview');
    const shareBtn = document.getElementById('share-btn');
    const shareStatus = document.getElementById('share-status');

    function updatePreview() {
      iframe.srcdoc = textarea.value;
    }

    function loadFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const content = params.get('c');
      if (content !== null) {
        const decoded = decodeURIComponent(content);
        textarea.value = decoded;
        updatePreview();
      } else {
        textarea.value = '<div style="width:100px; height:100px; border:solid; margin:40svh auto 0;"></div>';
        updatePreview();
      }
    }

    async function copyShareLink() {
      const baseUrl = window.location.origin + window.location.pathname;
      const content = textarea.value;
      const url = baseUrl + '?c=' + encodeURIComponent(content);

      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(url);
        } else {
          const tempInput = document.createElement('input');
          tempInput.value = url;
          document.body.appendChild(tempInput);
          tempInput.select();
          document.execCommand('copy');
          document.body.removeChild(tempInput);
        }
        shareStatus.textContent = 'Link copied to clipboard.';
      } catch (e) {
        shareStatus.textContent = 'Failed to copy link.';
      }

      setTimeout(() => {
        shareStatus.textContent = '';
      }, 2000);
    }

    textarea.addEventListener('input', updatePreview);
    shareBtn.addEventListener('click', copyShareLink);

    loadFromUrl();
  </script>
</body>
</html>
